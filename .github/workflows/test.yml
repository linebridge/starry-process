name: Test
on:
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    uses: yoinspiration/axci/.github/workflows/test.yml@feat/ci-test-selection-hardening
    with:
      crate_name: "starry-process"
      test_targets: "auto"
      base_ref: ${{ github.event_name == 'push' && github.event.before || 'origin/main' }}
      runs_on: '["self-hosted","Linux","X64"]'
      axci_ref: "feat/ci-test-selection-hardening"

